name: Publish to Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    env:
      OUTPUT_FILE_PREFIX: PicGenTool

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version
        id: get_version
        run: |
          $content = Get-Content version.txt -Raw
          if ($content -match "FileVersion', u'([\d\.]+)'")
          {
              $version = $matches[1]
              echo "version=$version" >> $env:GITHUB_OUTPUT
          }
          else
          {
              echo "::error::Failed to extract version from version.txt"
              exit 1
          }

      - name: Build executable
        run: |
          echo "Using version: ${{ steps.get_version.outputs.version }}"
          if (Test-Path pgt.spec) {
              pyinstaller pgt.spec --clean --noconfirm
              Move-Item -Path "dist/图片文档生成工具.exe" -Destination "dist/${{ env.OUTPUT_FILE_PREFIX }}.${{ steps.get_version.outputs.version }}.exe" -Force
          } else {
              pyinstaller --onefile --add-data "templates;templates" --add-data "favicon.png;." --icon="favicon.png" --windowed --clean --name "${{ env.OUTPUT_FILE_PREFIX }}.${{ steps.get_version.outputs.version }}" app.py
          }

      - name: Delete existing tag if exists
        run: |
          $tag_name="v${{ steps.get_version.outputs.version }}"
          git tag -d $tag_name 2>$null
          if ($LASTEXITCODE -ne 0) { $LASTEXITCODE = 0 }
          git push origin :refs/tags/$tag_name 2>$null
          if ($LASTEXITCODE -ne 0) { $LASTEXITCODE = 0 }

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/${{ env.OUTPUT_FILE_PREFIX }}.${{ steps.get_version.outputs.version }}.exe
          asset_name: ${{ env.OUTPUT_FILE_PREFIX }}.${{ steps.get_version.outputs.version }}.exe
          asset_content_type: application/octet-stream