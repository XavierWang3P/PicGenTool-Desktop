name: Publish to Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      OUTPUT_FILE_PREFIX: PicGenTool

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version
        id: get_version
        run: |
          $version = (Get-Content version.txt | Select-String -Pattern "FileVersion', u'([\d\.]+)'" | ForEach-Object { $_.Matches.Groups[1].Value })
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build executable
        run: |
          echo "Using version: ${{ steps.get_version.outputs.version }}"
          pyinstaller --onefile --add-data "templates;templates" --add-data "favicon.png;." --icon="favicon.png" --windowed --clean --name "${{ env.OUTPUT_FILE_PREFIX }}.${{ steps.get_version.outputs.version }}" app.py

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false

      - name: Delete old releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $current_release = "v${{ steps.get_version.outputs.version }}"
          $releases = gh release list --limit 1000 | ForEach-Object { $_.Split()[0] }
          foreach ($release in $releases) {
            if ($release -ne $current_release) {
              echo "Deleting release: $release"
              gh release delete $release --cleanup-tag -y
            }
          }

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/${{ env.OUTPUT_FILE_PREFIX }}.${{ steps.get_version.outputs.version }}.exe
          asset_name: ${{ env.OUTPUT_FILE_PREFIX }}.${{ steps.get_version.outputs.version }}.exe
          asset_content_type: application/octet-stream
