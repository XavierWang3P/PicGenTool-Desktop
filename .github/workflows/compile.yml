name: Publish to Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    env:
      OUTPUT_FILE_PREFIX: PGT

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          $content = Get-Content version.txt -Raw
          if ($content -match "FileVersion', u'([\d\.]+)'") {
              $version = $matches[1]
              echo "version=$version" >> $env:GITHUB_OUTPUT
          }
          else {
              echo "::error::Failed to extract version from version.txt"
              exit 1
          }

      - name: Build executable
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          echo "Using version: $version"

          if (Test-Path pgt.spec) {
              pyinstaller pgt.spec --clean --noconfirm
              $distDir = "dist/PGT"
              if (-not (Test-Path $distDir)) {
                  echo "::error::Expected directory '$distDir' was not created"
                  exit 1
              }

              $zipPath = "dist/${{ env.OUTPUT_FILE_PREFIX }}.$version.zip"
              if (Test-Path $zipPath) {
                  Remove-Item $zipPath -Force
              }
              Compress-Archive -Path "$distDir/*" -DestinationPath $zipPath
              echo "asset_path=$zipPath" >> $env:GITHUB_OUTPUT
          }
          else {
              pyinstaller --onefile --add-data "templates;templates" --add-data "favicon.png;." --icon="favicon.png" --windowed --clean --name "${{ env.OUTPUT_FILE_PREFIX }}.$version" main.py
              $exePath = "dist/${{ env.OUTPUT_FILE_PREFIX }}.$version.exe"
              echo "asset_path=$exePath" >> $env:GITHUB_OUTPUT
          }

      - name: Delete existing tag if exists
        shell: pwsh
        run: |
          $tagName = "v${{ steps.get_version.outputs.version }}"
          git tag -d $tagName 2>$null
          if ($LASTEXITCODE -ne 0) { $LASTEXITCODE = 0 }
          git push origin ":refs/tags/$tagName" 2>$null
          if ($LASTEXITCODE -ne 0) { $LASTEXITCODE = 0 }

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/${{ env.OUTPUT_FILE_PREFIX }}.${{ steps.get_version.outputs.version }}.zip
          asset_name: ${{ env.OUTPUT_FILE_PREFIX }}.${{ steps.get_version.outputs.version }}.zip
          asset_content_type: application/zip
