name: Publish to Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    env:
      OUTPUT_FILE_PREFIX: PGT
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          $content = Get-Content version.txt -Raw
          if ($content -match "FileVersion', u'([\d\.]+)'") {
              $version = $matches[1]
              echo "version=$version" >> $env:GITHUB_OUTPUT
          }
          else {
              echo "::error::Failed to extract version from version.txt"
              exit 1
          }

      - name: Build executable
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          echo "Using version: $version"

          if (Test-Path pgt.spec) {
              pyinstaller pgt.spec --clean --noconfirm
              $distDir = "dist/PGT"
              if (-not (Test-Path $distDir)) {
                  echo "::error::Expected directory '$distDir' was not created"
                  exit 1
              }

              $zipPath = "dist/${{ env.OUTPUT_FILE_PREFIX }}.$version.zip"
              if (Test-Path $zipPath) {
                  Remove-Item $zipPath -Force
              }
              Compress-Archive -Path "$distDir/*" -DestinationPath $zipPath
          }
          else {
              pyinstaller --onefile --add-data "templates;templates" --add-data "favicon.png;." --icon="favicon.png" --windowed --clean --name "${{ env.OUTPUT_FILE_PREFIX }}.$version" main.py
          }

      - name: Delete existing tag if exists
        shell: pwsh
        run: |
          $tagName = "v${{ steps.get_version.outputs.version }}"
          git tag -d $tagName 2>$null
          if ($LASTEXITCODE -ne 0) { $LASTEXITCODE = 0 }
          git push origin ":refs/tags/$tagName" 2>$null
          if ($LASTEXITCODE -ne 0) { $LASTEXITCODE = 0 }

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/${{ env.OUTPUT_FILE_PREFIX }}.${{ steps.get_version.outputs.version }}.zip
